x-service-env: &service-env
  KAFKA_BROKERS: kafka:9092
  REDIS_ADDR: redis:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: saga-postgres
    environment:
      POSTGRES_USER: saga
      POSTGRES_PASSWORD: saga
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saga"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: saga-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: saga-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: ridebooking-saga-cluster
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 15

  booking-service:
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    container_name: saga-booking-service
    environment:
      <<: *service-env
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://saga:saga@postgres:5432/booking_service?sslmode=disable"
      IDEMPOTENCY_PREFIX: "booking-service"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  driver-matching-service:
    build:
      context: .
      dockerfile: services/driver-matching-service/Dockerfile
    container_name: saga-driver-matching-service
    environment:
      <<: *service-env
      POSTGRES_DSN: "postgres://saga:saga@postgres:5432/driver_matching_service?sslmode=disable"
      IDEMPOTENCY_PREFIX: "driver-matching-service"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: saga-payment-service
    environment:
      <<: *service-env
      POSTGRES_DSN: "postgres://saga:saga@postgres:5432/payment_service?sslmode=disable"
      IDEMPOTENCY_PREFIX: "payment-service"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: saga-notification-service
    environment:
      <<: *service-env
      IDEMPOTENCY_PREFIX: "notification-service"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
